[tool.ruff.format]
line-ending = "lf"
quote-style = "double"
indent-style = "space"

[tool.ruff]
line-length = 88
indent-width = 4
force-exclude = true
fix = true

[tool.ruff.lint]
select = [
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "E",      # pycodestyle errors
    "EM",     # flake8-errmsg
    "F",      # pyflakes
    "FA",     # flake8-future-annotations
    "I",      # isort
    "PERF",   # perflint
    "PIE",    # flake8-pie
    "RUF",    # ruff-specific rules
    "SIM",    # flake8-simplify
    "UP",     # pyupgrade
    "W",      # pycodestyle warnings
]

ignore = [
    "E501",   # Line length regulated by formatter
    "RUF005", # Consider expression instead of concatenation
    "SIM108", # Use ternary operator
    "SIM114", # Combine `if` branches
]
